# Despliegue declarativo en Render — un solo Web Service que sirve
# tanto la UI (HTMLResponse desde main.py) como la API.
#
# Para usarlo: en Render -> "New +" -> "Blueprint" -> apunta al repo.

services:
  - type: web
    name: z-control
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install uv && uv sync --no-dev && uv run python scripts/predeploy_check.py
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SW_ENV
        value: "test"
      - key: SW_USER
        sync: false
      - key: SW_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
