    <section id="panel-clientes" class="tab-panel card">
      <div class="section-title">
        <div>
          <h2>Clientes</h2>
          <p class="muted" style="margin:4px 0 0">Catálogo de receptores frecuentes para seleccionar al facturar.</p>
        </div>
        <div class="toolbar">
          <span class="count-pill" id="clientesCount">0 clientes</span>
          <button class="btn ghost" type="button" onclick="loadClientes()">Actualizar</button>
          <button class="btn" type="button" onclick="openClienteFormFromTab()"><i class="fa-solid fa-user-plus"></i> Agregar</button>
        </div>
      </div>
      <div id="clientesNotice" class="status" aria-live="polite"></div>
      <div id="clienteFormClientes" class="card hide" style="box-shadow:none;margin-bottom:12px;background:#fbfaf8">
        <h3 id="clienteFormTitle" class="client-form-title">Agregar cliente</h3>
        <div class="form-grid">
          <div><label>RFC</label><input id="cliRfc" value="XAXX010101000" oninput="this.value=this.value.toUpperCase()"></div>
          <div><label>Nombre fiscal</label><input id="cliNombre" value="PUBLICO EN GENERAL"></div>
          <div><label>CP</label><input id="cliCp" inputmode="numeric" maxlength="5"></div>
          <div><label>Correo oficial/principal</label><input id="cliEmail" type="email" placeholder="cliente@empresa.com"></div>
          <div><label>Correo adicional</label><input id="cliEmailAdicional1" type="email" placeholder="contabilidad@empresa.com"></div>
          <div><label>&nbsp;</label><div class="muted" style="font-size:.8rem;padding-top:9px">Máximo 2 correos: 1 principal y 1 adicional.</div></div>
          <div><label>Régimen</label><select id="cliRegimen"></select></div>
          <div><label>Uso CFDI</label><select id="cliUso"></select></div>
        </div>
        <div class="section-title" style="margin-top:14px"><h3 style="margin:0">Crédito</h3><span class="muted">Solo visibilidad operativa para facturas PPD.</span></div>
        <div class="form-grid">
          <div><label>Apto para crédito</label><select id="cliCreditoHabilitado"><option value="0">No</option><option value="1">Sí</option></select></div>
          <div><label>Días de crédito</label><input id="cliDiasCredito" type="number" min="0" max="365" step="1" value="0"></div>
          <div><label>Límite de crédito opcional</label><input id="cliLimiteCredito" type="number" min="0" step="0.01" placeholder="Sin límite"></div>
          <div class="form-span"><label>Notas de crédito</label><textarea id="cliCreditoNotas" maxlength="1000" placeholder="Condiciones, autorización interna o comentarios administrativos"></textarea></div>
        </div>
        <div class="toolbar" style="margin-top:10px">
          <button class="btn" id="btnGuardarCliente" type="button" onclick="saveClienteFromTab()">Guardar cliente</button>
          <button class="btn ghost" type="button" onclick="cancelClienteForm()">Cancelar</button>
          <span id="clientesMsg" class="status"></span>
        </div>
      </div>
      <div><label>Buscar cliente</label><input id="clienteSearch" placeholder="Nombre, RFC, CP o uso CFDI" oninput="renderClientesList()"></div>
      <div class="list client-list" id="clientesList"><div class="empty">Cargando clientes...</div></div>
    </section>
