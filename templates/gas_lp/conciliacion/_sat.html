    <section class="section" data-section="sat">
      <div class="panel">
        <div class="section-head"><div><h2>Cancelación / Consulta SAT</h2><div class="muted small">Consulta auditoría PAC/SW y envía cancelaciones fiscales reales con evidencia.</div></div><span class="pill neutral" id="satCount">0 facturas</span></div>
        <div class="filters sat-filters" style="margin-bottom:12px">
          <div><label>Cliente</label><input id="satClienteFiltro" placeholder="RFC, nombre, folio o UUID" oninput="renderSat(satFilteredRows())"></div>
          <div><label>Día</label><input id="satDiaFiltro" type="date" onchange="renderSat(satFilteredRows())"></div>
          <div><label>Estado</label><select id="satEstadoFiltro" onchange="renderSat(satFilteredRows())"><option value="">Todos</option><option value="vigente">Vigente</option><option value="cancelada">Cancelada</option><option value="sin_uuid">Sin UUID</option></select></div>
          <div><label>Método</label><select id="satMetodoFiltro" onchange="renderSat(satFilteredRows())"><option value="">Todos</option><option value="PUE">PUE</option><option value="PPD">PPD</option></select></div>
          <button class="btn ghost" onclick="clearSatFilters()">Limpiar</button>
        </div>
        <div class="table-wrap sat-scroll"><table class="sat-table"><thead><tr><th class="sat-date">Fecha</th><th class="sat-client">Cliente</th><th class="sat-total">Total</th><th class="sat-status">Estado</th><th class="sat-uuid">UUID</th><th class="sat-actions">Acciones</th></tr></thead><tbody id="satRows"></tbody></table></div>
        <div id="cancelMsg" class="status"></div>
      </div>
    </section>
