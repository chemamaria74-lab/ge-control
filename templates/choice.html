<!DOCTYPE html>
<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GE CONTROL</title>
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/ge-brand.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--ge-font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 18% 18%, rgba(200,169,107,.16), transparent 28%),
        linear-gradient(135deg, #5B0F1D 0%, #111111 100%);
    }
    .lang-switcher {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      display: flex;
      gap: .5rem;
      z-index: 100;
    }
    .lang-btn {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .4rem .85rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.55);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      font-family: inherit;
    }
    .lang-btn:hover { background: rgba(255,255,255,.14); color: #fff; border-color: rgba(255,255,255,.4); }
    .lang-btn.active { background: rgba(255,255,255,.18); color: #fff; border-color: rgba(255,255,255,.55); }
    .wrapper { text-align: center; }
    .choice-container { display: flex; gap: 1rem; padding: 2rem; max-width: 1120px; width: 100%; }
    .choice-card {
      flex: 1; background: rgba(255,255,255,0.06); border-radius: 12px;
      padding: 2.2rem 1.6rem; text-align: left; cursor: pointer;
      transition: all 0.2s ease; border: 1px solid rgba(200,169,107,.16);
      text-decoration: none; display: block;
    }
    .choice-card:hover { transform: translateY(-4px); border-color: rgba(200,169,107,.5); background: rgba(255,255,255,0.10); }
    .choice-card.transporte,.choice-card.gas-lp,.choice-card.gasolineras { border-color: rgba(200,169,107,.18); }
    .choice-icon { font-size: 2rem; margin-bottom: 1.25rem; color:#C8A96B; }
    .choice-card.transporte .choice-icon,.choice-card.gas-lp .choice-icon,.choice-card.gasolineras .choice-icon { color: #C8A96B; }
    .choice-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .choice-desc { font-size: 0.9rem; color: #94a3b8; line-height: 1.5; }
    .choice-badge { display: inline-block; padding: .4rem .8rem; border-radius: 999px; font-size: .72rem; font-weight: 700; margin-top: 1rem; background:rgba(200,169,107,.16);color:#F5F5F5;border:1px solid rgba(200,169,107,.24); }
    .choice-card.transporte .choice-badge,.choice-card.gas-lp .choice-badge,.choice-card.gasolineras .choice-badge { background:rgba(200,169,107,.16);color:#F5F5F5; }
    .brand-logo { margin-bottom: 2rem; }
    .brand-logo img { width: 310px; max-width:80vw; }
    @media (max-width: 640px) {
      .choice-container { flex-direction: column; }
      .lang-switcher { top: .8rem; right: .8rem; }
    }
  </style>
</head>
<body>

  <div class="lang-switcher">
    <button class="lang-btn" id="btnEs" onclick="setLang('es')">
      ES
    </button>
    <button class="lang-btn" id="btnEn" onclick="setLang('en')">
      EN
    </button>
  </div>

  <div class="wrapper">
    <div class="brand-logo">
      <img src="/static/img/ge-control-logo-light.svg" alt="GE CONTROL">
    </div>
    <div class="choice-container">
      <a id="cardTransporte" class="choice-card transporte">
        <i class="fa-solid fa-truck-fast choice-icon"></i>
        <div class="choice-title" id="titleTransporte">Transporte</div>
        <div class="choice-desc" id="descTransporte">Logística de Hidrocarburos<br>Servicios de flete y distribución</div>
        <span class="choice-badge"><i class="fa-solid fa-route"></i> <span id="badgeTransporte">Módulo Transporte</span></span>
      </a>
      <a id="cardGasLp" class="choice-card gas-lp">
        <i class="fa-solid fa-industry choice-icon"></i>
        <div class="choice-title" id="titleGasLp">Gas LP</div>
        <div class="choice-desc" id="descGasLp">Controles Volumétricos<br>Cumplimiento Anexo 30</div>
        <span class="choice-badge"><i class="fa-solid fa-fire-flame-curved"></i> <span id="badgeGasLp">Módulo Gas LP</span></span>
      </a>
      <a id="cardGasolineras" class="choice-card gasolineras">
        <i class="fa-solid fa-gas-pump choice-icon"></i>
        <div class="choice-title" id="titleGasolineras">Gasolineras</div>
        <div class="choice-desc" id="descGasolineras">Estaciones de servicio<br>Precios, competencia y CFDI</div>
        <span class="choice-badge"><i class="fa-solid fa-map-location-dot"></i> <span id="badgeGasolineras">Módulo Gasolineras</span></span>
      </a>
    </div>
  </div>

  <script>
    const TEXTS = {
      es: {
        title:           'GE CONTROL - Seleccionar Módulo',
        titleTransporte: 'Transporte',
        descTransporte:  'Logística de Hidrocarburos<br>Servicios de flete y distribución',
        badgeTransporte: 'Módulo Transporte',
        titleGasLp:      'Gas LP',
        descGasLp:       'Controles Volumétricos<br>Cumplimiento Anexo 30',
        badgeGasLp:      'Módulo Gas LP',
        titleGasolineras:'Gasolineras',
        descGasolineras: 'Estaciones de servicio<br>Precios, competencia y CFDI',
        badgeGasolineras:'Módulo Gasolineras',
        hrefTransporte:  '/login/transporte',
        hrefGasLp:       '/login/gas-lp',
        hrefGasolineras: '/login/gasolineras',
      },
      en: {
        title:           'GE CONTROL - Select Module',
        titleTransporte: 'Transport',
        descTransporte:  'Hydrocarbon Logistics<br>Freight & distribution services',
        badgeTransporte: 'Transport Module',
        titleGasLp:      'LPG',
        descGasLp:       'Volumetric Controls<br>Regulatory Compliance',
        badgeGasLp:      'LPG Module',
        titleGasolineras:'Gas Stations',
        descGasolineras: 'Service stations<br>Prices, competition & CFDI',
        badgeGasolineras:'Gas Stations Module',
        hrefTransporte:  '/login/transporte?lang=en',
        hrefGasLp:       '/login/gas-lp?lang=en',
        hrefGasolineras: '/login/gasolineras?lang=en',
      },
    };

    let _lang = localStorage.getItem('zc_lang') || 'es';

    function applyLang(lang) {
      const t = TEXTS[lang];
      document.title = t.title;
      document.getElementById('htmlRoot').lang = lang;
      document.getElementById('titleTransporte').textContent  = t.titleTransporte;
      document.getElementById('descTransporte').innerHTML     = t.descTransporte;
      document.getElementById('badgeTransporte').textContent  = t.badgeTransporte;
      document.getElementById('cardTransporte').href          = t.hrefTransporte;
      document.getElementById('titleGasLp').textContent      = t.titleGasLp;
      document.getElementById('descGasLp').innerHTML          = t.descGasLp;
      document.getElementById('badgeGasLp').textContent       = t.badgeGasLp;
      document.getElementById('cardGasLp').href               = t.hrefGasLp;
      document.getElementById('titleGasolineras').textContent  = t.titleGasolineras;
      document.getElementById('descGasolineras').innerHTML     = t.descGasolineras;
      document.getElementById('badgeGasolineras').textContent  = t.badgeGasolineras;
      document.getElementById('cardGasolineras').href          = t.hrefGasolineras;
      document.getElementById('btnEs').classList.toggle('active', lang === 'es');
      document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    }

    function setLang(lang) {
      _lang = lang;
      localStorage.setItem('zc_lang', lang);
      applyLang(lang);
    }

    applyLang(_lang);
  </script>
</body>
</html>
