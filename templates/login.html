<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GE CONTROL - {{ nombre_modulo }}</title>
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/ge-brand.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--ge-font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 18% 16%, rgba(200,169,107,.18), transparent 28%),
        linear-gradient(135deg, #5B0F1D 0%, #111111 100%);
      padding: 2rem 1rem 4.5rem;
      overflow-x: hidden;
    }
    .lang-switcher {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: .45rem;
      z-index: 5;
    }
    .lang-btn {
      border: 1px solid rgba(255,255,255,.24);
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.72);
      border-radius: 999px;
      padding: .42rem .85rem;
      font-family: inherit;
      font-size: .76rem;
      font-weight: 800;
      cursor: pointer;
    }
    .lang-btn.active {
      background: #F5F5F5;
      border-color: #F5F5F5;
      color: #5B0F1D;
    }
    .login-card {
      background: rgba(17,17,17,0.74);
      backdrop-filter: blur(20px);
      border-radius: 14px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(200,169,107,0.18);
      box-shadow: 0 32px 80px rgba(0,0,0,.26);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-brand img {
      width: 260px;
      margin-bottom: 1rem;
    }
    .login-brand h2 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .login-brand .module-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: rgba(200,169,107,.16);
      border: 1px solid rgba(200,169,107,.28);
      border-radius: 999px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      color: #cbd5e1;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field input {
      width: 100%;
      padding: 1rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: #C8A96B;
    }
    .field input::placeholder { color: #64748b; }
    .btn-login {
      width: 100%;
      padding: 1rem;
      background: #7A1E2C;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #5B0F1D; }
    .login-err {
      color: #f87171;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover { color: #fff; }
    .ge-legal-footer {
      position: fixed;
      left: 50%;
      bottom: .75rem;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 32px));
      margin: 0;
      color: rgba(255,255,255,.72);
      z-index: 2;
    }
    .ge-legal-footer strong { color: rgba(255,255,255,.9); }
    .ge-legal-links a { color: #E1C482; }
    @media (max-height: 760px) {
      body { justify-content: flex-start; padding-top: 3.8rem; }
      .ge-legal-footer { position: static; transform: none; margin: 1rem auto .75rem; }
    }
    @media (max-width: 640px) {
      body { padding: 4rem .9rem 1rem; }
      .login-card { padding: 2.1rem 1.35rem; max-width: 420px; }
      .login-brand img { width: 220px; }
      .ge-legal-footer { position: static; transform: none; margin: 1rem auto 0; width: 100%; }
    }
  </style>

<script>
(function(){
  const _langUrl    = new URLSearchParams(location.search).get('lang');
  const _langStored = localStorage.getItem('zc_lang');
  const _lang = (_langUrl === 'en' || _langUrl === 'es') ? _langUrl
              : (_langStored === 'en' || _langStored === 'es') ? _langStored
              : 'es';
  localStorage.setItem('zc_lang', _lang);
  if (_lang !== 'en') return;

  const EN = {
    title:       'GE CONTROL - {{ nombre_modulo }}',
    usuario:     'USERNAME',
    contrasena:  'PASSWORD',
    placeholder_user: 'username',
    placeholder_pass: '••••••••',
    btn_login:   'Sign in',
    back:        'Change module',
  };

  document.addEventListener('DOMContentLoaded', function(){
    // Labels
    const labels = document.querySelectorAll('.field label');
    if(labels[0]) labels[0].textContent = EN.usuario;
    if(labels[1]) labels[1].textContent = EN.contrasena;
    // Placeholders
    const userInput = document.getElementById('loginUser');
    const passInput = document.getElementById('loginPass');
    if(userInput) userInput.placeholder = EN.placeholder_user;
    if(passInput) passInput.placeholder = EN.placeholder_pass;
    // Botón
    const btn = document.querySelector('.btn-login');
    if(btn) btn.textContent = EN.btn_login;
    // Link de regreso
    const back = document.querySelector('.back-link a');
    if(back) back.innerHTML = '<i class="fa-solid fa-arrow-left"></i> ' + EN.back;
  });
})();
</script>

</head>
<body>
  <div class="lang-switcher" aria-label="Idioma">
    <button class="lang-btn" id="loginLangEs" type="button" onclick="setLoginLang('es')">ES</button>
    <button class="lang-btn" id="loginLangEn" type="button" onclick="setLoginLang('en')">EN</button>
  </div>
  <div class="login-card">
    <div class="login-brand">
      <img src="/static/img/ge-control-logo-light.svg" alt="GE CONTROL">
      <h2>{{ nombre_modulo }}</h2>
      <span class="module-badge"><i class="fa-solid {{ icon_module }}"></i> {{ nombre_modulo }}</span>
    </div>
    <form id="loginForm">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="loginUser" placeholder="usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <input type="hidden" id="modulo" value="{{ modulo }}">
      <button type="submit" class="btn-login">Iniciar sesión</button>
    </form>
    <div class="login-err" id="loginErr"></div>
    <div class="back-link">
      <a href="/choice"><i class="fa-solid fa-arrow-left"></i> Cambiar módulo</a>
    </div>
  </div>
  <script>
    function currentLoginLang() {
      const urlLang = new URLSearchParams(location.search).get('lang');
      const stored = localStorage.getItem('zc_lang');
      return (urlLang === 'en' || urlLang === 'es') ? urlLang : ((stored === 'en' || stored === 'es') ? stored : 'es');
    }
    function syncLoginLangButtons() {
      const lang = currentLoginLang();
      document.getElementById('loginLangEs')?.classList.toggle('active', lang === 'es');
      document.getElementById('loginLangEn')?.classList.toggle('active', lang === 'en');
    }
    function setLoginLang(lang) {
      localStorage.setItem('zc_lang', lang);
      const url = new URL(location.href);
      url.searchParams.set('lang', lang);
      location.replace(url.toString());
    }
    syncLoginLangButtons();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const modulo = document.getElementById('modulo').value;
      const errEl = document.getElementById('loginErr');
      errEl.textContent = '';
      if (!user || !pass) { errEl.textContent = 'Ingresa usuario y contraseña.'; return; }
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass, modulo: modulo }),
        });
        const data = await res.json();
        if (data.success) {
          // sat_token → Gas LP (app.html) | zc_token → Transporte (transporte.html)
          localStorage.setItem('sat_token',   data.token);
          localStorage.setItem('zc_token',    data.token);
          localStorage.setItem('sat_user_id', data.user_id);
          localStorage.setItem('sat_modulo',  modulo);
          const _lang = localStorage.getItem('zc_lang') || 'es';
          window.location.href = data.modulo === 'transporte'
            ? '/transporte?lang=' + _lang
            : '/app?lang=' + _lang;
        } else {
          errEl.textContent = data.detail || 'Credenciales incorrectas.';
        }
      } catch(e) { errEl.textContent = 'Error de conexión.'; }
    });
  </script>
</body>
</html>
