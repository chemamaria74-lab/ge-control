<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GE CONTROL | Operador</title>
  <link rel="icon" href="/static/img/favicon.svg">
  <style>
    :root{--wine:#7A1E2C;--wine2:#5B0F1D;--gold:#C8A96B;--ink:#111;--muted:#667085;--line:#E4E7EC;--bg:#F5F5F5;--surface:#fff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink)}
    .top{position:sticky;top:0;background:#5B0F1D;color:white;padding:14px 18px;box-shadow:0 10px 24px rgba(17,17,17,.14);border-bottom:1px solid rgba(200,169,107,.22);z-index:10;display:flex;align-items:center;gap:12px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.08em}.brand img{width:34px;height:34px;object-fit:contain}.sub{font-size:13px;color:rgba(255,255,255,.78);margin-top:4px}.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.badge{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.14);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;color:#fff}
    main{padding:18px;max-width:960px;margin:auto}.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 10px 24px rgba(16,24,40,.06)}
    .hero{display:grid;grid-template-columns:1.4fr .6fr;gap:14px;align-items:stretch}.profile{display:grid;grid-template-columns:44px 1fr;gap:12px;align-items:center}.avatar{width:44px;height:44px;border-radius:10px;background:#F5F1E8;color:var(--wine);display:grid;place-items:center;font-weight:900}.profile h1{font-size:21px;margin:0 0 4px}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.kpi{border:1px solid var(--line);border-radius:8px;padding:12px;background:#FAF9F7}.kpi b{display:block;font-size:22px}.kpi span{font-size:12px;color:var(--muted);font-weight:800}
    .route{font-size:18px;font-weight:800}.meta{margin-top:8px;color:var(--muted);font-size:14px;display:grid;gap:3px}.products{margin-top:10px;font-size:13px;color:#344054}
    .doc-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border:0;border-radius:12px;padding:15px 10px;font-weight:800;font-size:15px;cursor:pointer;text-align:center;text-decoration:none}
    .doc-list{margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:12px;background:#FAF9F7}.doc-list h3{font-size:14px;margin:0 0 10px}.doc-mini{display:flex;gap:8px;flex-wrap:wrap}
    .primary{background:var(--wine);color:white}.dark{background:#2B2B2B;color:white}.ok{background:#ECFDF3;color:#027A48}.warn{background:#FFF7E6;color:#9A6700}
    .pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;margin-top:10px}.pill.ok{border-color:#ABEFC6}
    .empty{padding:38px 18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:10px;background:#fff}.empty h2{margin:0 0 6px;color:var(--ink);font-size:18px}.toast{position:fixed;left:16px;right:16px;bottom:16px;background:#111;color:white;padding:13px 15px;border-radius:12px;display:none}
    .task{border-left:4px solid var(--gold)}.task h2{font-size:16px;margin:0 0 8px}.task ul{margin:10px 0 0;padding-left:18px;color:#344054;font-size:13px}.task small{color:var(--muted)}
    .detected{border:1px solid #D8E7FF;background:#F8FBFF}.detected-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.detected h2{font-size:18px;margin:0}.detected .source{font-size:12px;color:#175CD3;font-weight:900;text-transform:uppercase}.detected-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px}.detected-metric{border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px}.detected-metric span{display:block;color:var(--muted);font-size:11px;font-weight:900}.detected-metric b{display:block;margin-top:3px;font-size:15px}.detected-actions{display:grid;grid-template-columns:1.4fr .8fr;gap:10px;margin-top:14px}.chip{border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900;background:#EEF4FF;color:#175CD3;white-space:nowrap}
    .notice{display:grid;gap:10px}.notice-item{border:1px solid var(--line);border-radius:8px;padding:11px;background:#fff}.notice-item b{display:block;margin-bottom:3px}.section-title{font-size:15px;font-weight:900;margin:18px 0 10px;color:#344054}
    @media(max-width:760px){.top{flex-wrap:wrap}.top-actions{margin-left:0;width:100%}main{padding:12px}.hero{grid-template-columns:1fr}.kpis{grid-template-columns:1fr}.doc-actions,.actions,.detected-actions{grid-template-columns:1fr}.detected-grid{grid-template-columns:1fr}.btn{width:100%;min-height:52px}.card{border-radius:9px;padding:14px}.route{font-size:16px}}
  </style>
</head>
<body>
  <header class="top">
    <div><div class="brand"><img src="/static/img/ge-isotype-light.svg" alt=""> GE CONTROL</div><div class="sub">Portal de operador</div></div>
    <div class="top-actions"><span class="badge" id="empresaBadge">Empresa -</span><button class="btn dark" onclick="logout()">Salir</button></div>
  </header>
  <main id="app"><div class="empty">Cargando viajes asignados...</div></main>
  <div id="toast" class="toast"></div>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const app = document.getElementById('app');
    const toast = (m)=>{const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2600)};
    const money = n => Number(n||0).toLocaleString('es-MX',{style:'currency',currency:'MXN'});
    async function api(path, opts={}){
      const r = await fetch(path + (path.includes('?')?'&':'?') + 'token=' + encodeURIComponent(token), {
        method: opts.method || 'GET',
        headers: {'Content-Type':'application/json'},
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.detail || d.error || 'Error');
      return d;
    }
    function renderTasks(tasks){
      if(!tasks.length) return '';
      return tasks.map(t => `<section class="card task">
        <h2>${t.titulo || 'Tarea de Carta Aporte'}</h2>
        <small>${(t.window_start||'').slice(0,16).replace('T',' ')} - ${(t.window_end||'').slice(0,16).replace('T',' ')}</small>
        <ul>${(t.facturas||[]).slice(0,8).map(f => `<li>${f.uuid || 'UUID pendiente'} · ${Number(f.litros||0).toLocaleString('es-MX')} L · ${f.producto || 'Producto'} · ${money(f.importe)}</li>`).join('')}</ul>
      </section>`).join('');
    }
    function renderDetectedLoads(loads){
      if(!loads.length) return '<section class="card"><h2>Facturas recibidas</h2><div class="meta">Cuando Taxo detecte una factura nueva para tu unidad, aparecerá aquí sin que tengas que descargar archivos.</div></section>';
      return '<div class="section-title">Facturas recibidas listas para revisar</div>' + loads.map(l => {
        const liters = Number(l.litros_detectados || 0);
        const confidence = Number(l.confidence_score || 0);
        return `<section class="card detected">
          <div class="detected-head"><div><div class="source">CFDI detectado SAT</div><h2>${esc(l.proveedor || 'Proveedor')}</h2><div class="meta">${esc(l.rfc_proveedor || '')} · ${(l.fecha_detectada||'').replace('T',' ').slice(0,16) || 'fecha pendiente'}</div></div><span class="chip">${esc(l.status_label || 'Pendiente')}</span></div>
          <div class="detected-grid">
            <div class="detected-metric"><span>Producto</span><b>${esc(l.producto_detectado || 'Por confirmar')}</b></div>
            <div class="detected-metric"><span>Volumen</span><b>${liters ? liters.toLocaleString('es-MX') : '—'} ${esc(l.unidad_detectada || 'L')}</b></div>
            <div class="detected-metric"><span>Origen</span><b>${esc(l.origen_detectado || l.proveedor || 'Por confirmar')}</b></div>
            <div class="detected-metric"><span>Destino</span><b>${esc(l.destino_detectado || 'Por confirmar')}</b></div>
          </div>
          <div class="meta">UUID: ${esc(l.uuid || 'pendiente')} · Confianza ${confidence}%</div>
          <div class="detected-actions">
            <button class="btn primary" onclick="detectedAction('${esc(l.id)}','confirm')">Preparar Carta Porte</button>
            <button class="btn dark" onclick="detectedAction('${esc(l.id)}','ignore')">No es mi carga</button>
          </div>
        </section>`;
      }).join('');
    }
    function renderShell(data, tasksHtml, viajesHtml, semanaHtml='', liquidacionHtml=''){
      const meta = data.meta || {};
      const chofer = meta.chofer || {};
      const empresa = meta.empresa || {};
      const resumen = data.resumen || {};
      empresaBadge.textContent = empresa.nombre || 'Empresa asignada';
      const notifs = (meta.notificaciones || []).map(n=>`<div class="notice-item"><b>${n.titulo || n.title || 'Notificación'}</b><span>${n.mensaje || n.message || n.tipo || 'Pendiente de revisar'}</span></div>`).join('') || '<div class="notice-item"><b>Sin notificaciones</b><span>No hay avisos nuevos para este operador.</span></div>';
      app.innerHTML = `<section class="card hero">
        <div>
          <div class="profile"><div class="avatar">${(chofer.nombre || '?').slice(0,1).toUpperCase()}</div><div><h1>${chofer.nombre || 'Operador'}</h1><div class="meta"><span>Chofer vinculado: ${chofer.nombre || '—'}</span><span>Licencia: ${chofer.licencia || '—'}</span><span>Empresa: ${empresa.nombre || '—'} ${empresa.rfc ? '· RFC '+empresa.rfc : ''}</span></div></div></div>
          <div class="kpis"><div class="kpi"><b>${resumen.viajes_activos || 0}</b><span>viajes activos</span></div><div class="kpi"><b>${resumen.documentos_pendientes || 0}</b><span>docs pendientes</span></div><div class="kpi"><b>12 h</b><span>sesión limitada</span></div></div>
        </div>
        <div><div class="section-title" style="margin-top:0">Notificaciones</div><div class="notice">${notifs}</div></div>
      </section>${tasksHtml}${semanaHtml}${viajesHtml}${liquidacionHtml}`;
    }
    function renderSemana(semana){
      const viajes = semana.viajes || [];
      if(!viajes.length) return '<section class="card"><h2>Semana</h2><div class="meta">Sin viajes programados esta semana.</div></section>';
      return `<section class="card"><h2>Viajes de la semana</h2>${viajes.slice(0,12).map(v=>`<div class="notice-item"><b>#${v.id} · ${v.nombre_origen || v.cp_origen || 'Origen'} → ${v.nombre_destino || v.cp_destino || 'Destino'}</b><span>${(v.fecha_hora_salida||'').replace('T',' ').slice(0,16)} · ${v.operacion_status || v.status || 'programado'} · Comisión ${money(v.comision_operador || 0)}</span></div>`).join('')}</section>`;
    }
    function renderLiquidacion(liqData){
      const l = liqData.liquidacion || {};
      if(!l.id) return '<section class="card"><h2>Liquidación actual</h2><div class="meta">Sin liquidación emitida todavía.</div></section>';
      return `<section class="card"><h2>Liquidación actual</h2><div class="kpis"><div class="kpi"><b>${money(l.total||0)}</b><span>total</span></div><div class="kpi"><b>${money(l.pago_banco||0)}</b><span>banco</span></div><div class="kpi"><b>${money(l.diferencia_efectivo||0)}</b><span>diferencia/efectivo</span></div></div><div class="meta">Periodo ${l.periodo || '—'} · Estado ${l.status || '—'}</div></section>`;
    }
    function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function render(data, tasks=[], semana={}, liquidacion={}, detectedLoads=[]){
      const viajes = data.viajes || [];
      if(!token){app.innerHTML='<div class="empty">Falta token de acceso.</div>';return}
      const tasksHtml = renderTasks(tasks);
      const detectedHtml = renderDetectedLoads(detectedLoads);
      const semanaHtml = renderSemana(semana);
      const liquidacionHtml = renderLiquidacion(liquidacion);
      if(!viajes.length){renderShell(data, detectedHtml + tasksHtml, '<div class="empty"><h2>Sin viajes activos</h2><div>Cuando oficina te asigne un viaje, aparecerá aquí con ruta, documentos y acciones rápidas.</div></div>', semanaHtml, liquidacionHtml);return}
      const viajesHtml = '<div class="section-title">Viajes activos</div>' + viajes.map(v => {
        const prods = (v.productos||[]).map(p => `${p.descripcion || p.clave_producto || 'Producto'} · ${Number(p.volumen_litros||0).toLocaleString('es-MX')} L`).join('<br>');
        return `<section class="card">
          <div class="route">${v.nombre_origen || v.cp_origen || 'Origen'} → ${v.nombre_destino || v.cp_destino || 'Destino'}</div>
          <div class="meta">
            <span>Salida: ${(v.fecha_hora_salida||'').replace('T',' ').slice(0,16) || 'Pendiente'}</span>
            <span>Volumen: ${Number(v.volumen_total_litros||0).toLocaleString('es-MX')} L</span>
            <span>Estatus: ${v.operacion_status || v.status || 'programado'}</span>
            <span>Comisión: ${money(v.comision_operador || 0)}</span>
          </div>
          <div class="products">${prods}</div>
          ${v.cfdi?.uuid_sat ? `<span class="pill ok">Carta Porte timbrada · ${String(v.cfdi.uuid_sat).slice(0,8)}</span>` : '<span class="pill">Carta Porte pendiente</span>'}
          ${v.uuid_cfdi ? `<div class="doc-actions">
            <a class="btn dark" href="/api/tr/operador/viajes/${v.id}/pdf?token=${encodeURIComponent(token)}" target="_blank" rel="noopener">Ver Carta Porte PDF</a>
            <a class="btn ok" href="/api/tr/operador/viajes/${v.id}/pdf?token=${encodeURIComponent(token)}&download=true">Descargar PDF</a>
          </div>` : ''}
          <div class="doc-list" id="docs-${v.id}"><h3>Documentos relacionados</h3><div class="meta">Buscando PDF/XML relacionados...</div></div>
          <div class="actions">
            <button class="btn ok" onclick="accion(${v.id},'recibido')">Ya lo recibí</button>
            <button class="btn primary" onclick="accion(${v.id},'en_camino')">Voy en camino</button>
            <button class="btn dark" onclick="accion(${v.id},'entregado')">Ya entregué</button>
            <button class="btn warn" onclick="accion(${v.id},'problema')">Tengo problema</button>
          </div>
        </section>`
      }).join('');
      renderShell(data, detectedHtml + tasksHtml, viajesHtml, semanaHtml, liquidacionHtml);
      setTimeout(()=>viajes.forEach(v=>loadDocs(v.id)), 0);
    }
    async function loadDocs(id){
      const box = document.getElementById(`docs-${id}`);
      if(!box) return;
      try{
        const d = await api(`/api/tr/operador/viajes/${id}/documentos-relacionados`);
        const docs = d.documentos || [];
        if(!docs.length){ box.innerHTML = '<h3>Documentos relacionados</h3><div class="meta">Sin PDF/XML relacionados todavía.</div>'; return; }
        box.innerHTML = `<h3>Documentos relacionados</h3><div class="doc-mini">${docs.map(x => `<a class="btn ${String(x.tipo||'').includes('xml') ? 'ok' : 'dark'}" href="${x.url}" target="_blank" rel="noopener">${x.label}</a>`).join('')}</div>`;
      }catch(e){
        box.innerHTML = '<h3>Documentos relacionados</h3><div class="meta">No se pudieron cargar documentos.</div>';
      }
    }
    async function load(){try{const [d,t,s,l,c]=await Promise.all([api('/api/tr/operador/viajes'),api('/api/tr/operador/carta-aporte/tareas'),api('/api/tr/operador/semana'),api('/api/tr/operador/liquidacion-actual'),api('/api/tr/operador/cargas-detectadas')]);render(d,t.tasks||[],s,l,c.loads||[])}catch(e){app.innerHTML=`<div class="empty">${e.message}</div>`}}
    async function detectedAction(id, action){
      const msg = action === 'confirm' ? '¿Confirmas que esta factura corresponde a tu carga para preparar la Carta Porte?' : '¿Marcar esta factura como no correspondiente a tu carga?';
      if(!confirm(msg)) return;
      try{const r=await api(`/api/tr/operador/cargas-detectadas/${encodeURIComponent(id)}/accion`,{method:'POST',body:{action}});toast(r.message || 'Actualizado');load()}catch(e){toast(e.message)}
    }
    async function accion(id, accion){
      let nota = '';
      if (accion === 'problema') nota = prompt('Describe brevemente el problema para oficina:') || '';
      try{await api(`/api/tr/operador/viajes/${id}/accion`,{method:'POST',body:{accion, nota}});toast('Actualizado');load()}catch(e){toast(e.message)}
    }
    function logout(){ location.href='/choice'; }
    load();
  </script>
</body>
</html>
