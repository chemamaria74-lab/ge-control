<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GE CONTROL | Operador Transporte</title>
  <link rel="icon" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/ge-brand.css">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;grid-template-rows:1fr auto;place-items:center;background:linear-gradient(135deg,#5B0F1D,#111);font-family:var(--ge-font);padding:22px;color:#111;overflow-x:hidden}
    .card{width:min(420px,100%);background:#fff;border:1px solid rgba(200,169,107,.28);border-radius:10px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.3)}
    img{width:220px;display:block;margin:0 auto 20px}h1{font-size:22px;margin:0 0 4px;text-align:center}.sub{text-align:center;color:#6F6A64;margin-bottom:22px}
    label{display:block;font-size:12px;font-weight:800;color:#6F6A64;margin:0 0 6px}input{width:100%;border:1px solid #d8d0c4;border-radius:8px;padding:13px 14px;font:inherit;text-transform:uppercase}
    .field{margin-bottom:14px}.btn{width:100%;border:0;border-radius:8px;background:#7A1E2C;color:#fff;padding:13px;font:inherit;font-weight:800;cursor:pointer}.err{color:#b91c1c;font-size:13px;min-height:18px;margin:12px 0;text-align:center}.back{text-align:center;margin-top:16px}.back a{color:#5B0F1D;text-decoration:none;font-weight:800}
    .ge-legal-footer{grid-row:2;width:min(760px,calc(100vw - 44px));margin:14px auto 0;color:rgba(255,255,255,.72)}
    .ge-legal-footer strong{color:rgba(255,255,255,.9)}.ge-legal-links a{color:#E1C482}
    @media(max-width:640px){body{padding:18px 14px}.card{padding:24px 18px}.ge-legal-footer{width:100%;font-size:10.5px}}
  </style>
</head>
<body>
  <main class="card">
    <img src="/static/img/ge-control-logo.svg" alt="GE CONTROL">
    <h1>Operador Transporte</h1>
    <div class="sub">Acceso con código y PIN</div>
    <form id="loginForm">
      <div class="field"><label>Código de operador</label><input id="code" autocomplete="username" placeholder="TR-ABC123"></div>
      <div class="field"><label>PIN</label><input id="pin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="••••••"></div>
      <button class="btn" type="submit">Entrar</button>
    </form>
    <div class="err" id="err"></div>
    <div class="back"><a href="/modulo/transporte/roles">Cambiar acceso</a></div>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.textContent = '';
      try {
        const res = await fetch('/api/internal-auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({section: 'transporte', code: document.getElementById('code').value, pin: document.getElementById('pin').value})
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.detail || 'No fue posible entrar.');
        if (data.operator_url) location.href = data.operator_url;
        else err.textContent = 'Este usuario no tiene portal de operador asignado.';
      } catch (ex) {
        err.textContent = ex.message;
      }
    });
  </script>
</body>
</html>
