<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GE CONTROL | Conciliación Gas LP</title>
  <link rel="icon" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/ge-brand.css">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f5f5;font-family:var(--ge-font);padding:22px;color:#111}.card{width:min(420px,100%);background:#fff;border:1px solid #e7e3dc;border-radius:8px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.14)}.logo{width:190px;display:block;margin:0 auto 20px}h1{font-size:22px;margin:0 0 4px;text-align:center}.sub{text-align:center;color:#6F6A64;margin-bottom:22px}label{display:block;font-size:12px;font-weight:800;color:#6F6A64;margin:0 0 6px}input{width:100%;border:1px solid #d8d0c4;border-radius:8px;padding:13px 14px;font:inherit}.field{margin-bottom:14px}.btn{width:100%;border:0;border-radius:8px;background:#7A1E2C;color:#fff;padding:13px;font:inherit;font-weight:800;cursor:pointer}.err{color:#b91c1c;font-size:13px;min-height:18px;margin:12px 0;text-align:center;font-weight:700}.back{text-align:center;margin-top:16px}.back a{color:#5B0F1D;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/static/img/ge-control-logo.svg" alt="GE CONTROL">
    <h1>Conciliación Gas LP</h1>
    <div class="sub">Facturas, complementos y cancelación</div>
    <form id="loginForm">
      <div class="field"><label>Usuario o correo</label><input id="code" autocomplete="username"></div>
      <div class="field"><label>Contraseña</label><input id="pin" type="password" autocomplete="current-password"></div>
      <button class="btn" type="submit">Entrar</button>
    </form>
    <div class="err" id="err"></div>
    <div class="back"><a href="/modulo/gas-lp/roles">Cambiar acceso</a></div>
  </main>
  <script src="/static/js/session_timeout.js?v=session-expiry-20260715"></script>
  <script>
    const ALLOWED_ROLES = ['admin','conciliacion','asistente_facturacion'];
    const CONCILIACION_TOKEN_KEY = 'ge_gaslp_conciliacion_token';
    localStorage.removeItem(CONCILIACION_TOKEN_KEY);
    function roleAllowed(role) {
      return ALLOWED_ROLES.includes(String(role || '').toLowerCase());
    }
    async function readJson(res) {
      try { return await res.json(); } catch (_) { return {}; }
    }
    async function loginSupabase(user, pass) {
      const res = await fetch('/api/auth/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({modulo:'gas_lp',username:user,password:pass})
      });
      const data = await readJson(res);
      if (!res.ok || !data.success) throw new Error(data.detail || 'Usuario o contraseña incorrectos.');
      if (!roleAllowed(data.role)) throw new Error('Tu rol Gas LP no permite entrar a conciliación.');
      return data.token;
    }
    async function loginInternal(user, pass) {
      const res = await fetch('/api/internal-auth/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({section:'gas_lp',code:user,pin:pass})
      });
      const data = await readJson(res);
      if (!res.ok || !data.ok) throw new Error(data.detail || 'Usuario o contraseña incorrectos.');
      if (!roleAllowed(data.role)) throw new Error('Tu rol Gas LP no permite entrar a conciliación.');
      return data.token;
    }
    loginForm.addEventListener('submit', async e => {
      e.preventDefault(); err.textContent = '';
      const user = code.value.trim();
      const pass = pin.value;
      if (!user || !pass) { err.textContent = 'Ingresa usuario y contraseña.'; return; }
      try {
        let token = '';
        if (user.includes('@')) {
          token = await loginSupabase(user, pass);
        } else {
          try { token = await loginInternal(user, pass); }
          catch (_) { token = await loginSupabase(user, pass); }
        }
        localStorage.setItem(CONCILIACION_TOKEN_KEY, token);
        window.GESessionTimeout?.markLogin();
        location.href = '/conciliacion/gas-lp';
      } catch(ex) { err.textContent = ex.message; }
    });
  </script>
</body>
</html>
