      <section class="panel" id="panel-suscripciones">
        <div class="hdr"><div><h2>Suscripciones</h2><p>Plan, límite de empresas, status y expiración.</p></div></div>
        <div class="card"><div class="form-grid"><div><label>Tenant ID</label><input id="subTenant"></div><div><label>Plan</label><select id="subPlan"><option>Básico</option><option>Profesional</option><option>Empresarial</option><option>Ilimitado</option></select></div><div><label>Max empresas</label><input id="subMax" type="number" value="1"></div><div><label>Status</label><select id="subStatus"><option>active</option><option>trialing</option><option>past_due</option><option>canceled</option><option>expired</option></select></div><div><label>Expira</label><input id="subExpires" type="date"></div><div><label>Notas internas</label><input id="subNotes"></div></div>
          <div class="license-grid">
            <div class="module-box"><h4>Gas LP</h4><label>Empresas permitidas</label><input id="limGasCompanies" type="number" value="1"><label>Asistentes permitidos</label><input id="limGasAssistants" type="number" value="2"><label class="check-row"><input id="limGasEnabled" type="checkbox" checked> Acceso activo</label><label class="check-row"><input id="limGasInvoice" type="checkbox" checked> Puede facturar</label><label class="check-row"><input id="limGasJson" type="checkbox" checked> Puede generar JSON</label><label class="check-row"><input id="limGasUpload" type="checkbox" checked> Puede cargar XML/Excel</label><label class="check-row"><input id="limGasReports" type="checkbox" checked> Puede ver reportes</label></div>
            <div class="module-box"><h4>Transporte</h4><label>Empresas permitidas</label><input id="limTrCompanies" type="number" value="1"><label>Admins permitidos</label><input id="limTrAdmins" type="number" value="1"><label>Operadores permitidos</label><input id="limTrOperators" type="number" value="5"><label>Vehículos permitidos</label><input id="limTrVehicles" type="number" placeholder="Vacío = sin límite"><label class="check-row"><input id="limTrEnabled" type="checkbox" checked> Acceso activo</label><label class="check-row"><input id="limTrCarta" type="checkbox" checked> Timbrar Carta Porte</label><label class="check-row"><input id="limTrInvoice" type="checkbox" checked> Facturar servicio</label><label class="check-row"><input id="limTrLiquidaciones" type="checkbox" checked> Liquidaciones</label></div>
          </div>
          <div class="actions"><button class="btn" onclick="saveSubscription()">Guardar suscripción</button><button class="btn btn-ghost" onclick="fillPlanDefaults()">Usar defaults del plan</button><span id="subMsg" class="status"></span></div>
        </div>
      </section>
