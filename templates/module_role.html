<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GE CONTROL - {{ nombre }}</title>
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/ge-brand.css">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f5f5;color:#111;font-family:var(--ge-font);padding:24px}
    main{width:min(760px,100%)}img{width:300px;max-width:82vw;display:block;margin:0 auto 28px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:#fff;border:1px solid #e7e3dc;border-radius:8px;padding:24px;text-decoration:none;color:#111;box-shadow:0 14px 36px rgba(17,17,17,.08)}
    .card:hover{border-color:#c8a96b}.card h1{font-size:22px;margin:0 0 8px}.card p{margin:0;color:#6f6a64;line-height:1.45}
    .back{display:inline-block;margin-top:18px;color:#5b0f1d;text-decoration:none;font-weight:700}@media(max-width:680px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <img src="/static/img/ge-control-logo.svg" alt="GE CONTROL">
    <div class="grid">
      {% for label, desc in roles %}
      <a class="card" href="{% if modulo == 'transporte' and label == 'Operador' %}/transporte/operador{% elif modulo == 'gas_lp' and label == 'Asistente de facturación' %}/gas-lp/asistente{% if lang %}?lang={{ lang }}{% endif %}{% else %}/login/{{ modulo|replace('_','-') }}?intent={{ label|lower|replace(' ', '_') }}{% if lang %}&lang={{ lang }}{% endif %}{% endif %}">
        <h1>{{ label }}</h1>
        <p>{{ desc }}</p>
      </a>
      {% endfor %}
    </div>
    <a class="back" href="/choice">Cambiar módulo</a>
  </main>
</body>
</html>
