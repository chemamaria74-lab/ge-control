<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GE CONTROL | Portal Gas LP</title>
  <link rel="icon" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/ge-brand.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--wine:#7A1E2C;--wine2:#5B0F1D;--gold:#C8A96B;--ink:#111;--muted:#6F6A64;--line:#E7E3DC;--bg:#F5F5F5;--surface:#fff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:var(--ge-font);color:var(--ink);min-height:100vh}
    .top{position:sticky;top:0;background:#5B0F1D;color:white;padding:14px 22px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(200,169,107,.22);z-index:10}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.brand img{width:58px;height:34px;object-fit:contain}.badge{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.14);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}.right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--wine);background:var(--wine);color:#fff;border-radius:8px;padding:10px 13px;font:inherit;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;gap:7px;align-items:center}.btn.ghost{background:#fff;color:var(--ink);border-color:#D8D0C4}.btn.sm{padding:8px 11px;border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.12);color:#fff}
    main{max-width:1180px;margin:0 auto;padding:22px}.hero{display:flex;justify-content:space-between;gap:14px;align-items:flex-end;margin-bottom:18px}h1{font-size:26px;margin:0 0 5px}.muted{color:var(--muted);line-height:1.5}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px;box-shadow:0 16px 40px rgba(15,28,45,.06)}.kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:900;letter-spacing:.04em}.kpi .value{font-size:24px;font-weight:900;margin-top:6px}.module{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start}.module i{width:34px;height:34px;border-radius:8px;background:#F5F1E8;color:var(--wine);display:grid;place-items:center}.module b{display:block;margin-bottom:4px}.list{display:grid;gap:10px;margin-top:12px}.empty{text-align:center;padding:34px;color:var(--muted)}
    @media(max-width:780px){.top{padding:12px;flex-wrap:wrap}.right{margin-left:0}.brand span{display:none}main{padding:14px}.hero{align-items:start;flex-direction:column}.grid{grid-template-columns:1fr}.btn{width:100%;justify-content:center}}
  </style>
</head>
<body>
  <header class="top">
    <div class="brand"><img src="/static/img/ge-isotype-light.svg" alt="GE"><span>GE CONTROL</span></div>
    <span class="badge"><i class="fa-solid fa-fire-flame-curved"></i> Gas LP</span>
    <span class="badge" id="roleBadge">Rol -</span>
    <div class="right">
      <span class="badge" id="nameBadge">-</span>
      <button class="btn sm" onclick="logout()">Salir</button>
    </div>
  </header>
  <main>
    <div class="hero">
      <div>
        <h1>Portal de asistente</h1>
        <p class="muted">Acceso limitado por empresa, módulo y rol interno. No es una cuenta global del SaaS.</p>
      </div>
      <a class="btn ghost" href="/app"><i class="fa-solid fa-up-right-from-square"></i> Abrir plataforma</a>
    </div>
    <div class="grid" id="kpis">
      <div class="card kpi"><div class="label">Sesión</div><div class="value">—</div></div>
      <div class="card kpi"><div class="label">Empresa</div><div class="value">—</div></div>
      <div class="card kpi"><div class="label">Módulos</div><div class="value">—</div></div>
      <div class="card kpi"><div class="label">Seguridad</div><div class="value">PIN</div></div>
    </div>
    <section class="card" style="margin-top:14px">
      <h2 style="margin:0;font-size:18px">Módulos permitidos</h2>
      <div class="list" id="modules"><div class="empty">Cargando permisos...</div></div>
    </section>
    <section class="card" style="margin-top:14px">
      <h2 style="margin:0;font-size:18px">Notas operativas</h2>
      <div class="list" id="notices"></div>
    </section>
  </main>
  <script>
    const token = localStorage.getItem('ge_gaslp_internal_token') || '';
    function iconFor(key){ return {facturacion:'file-invoice-dollar',xml_excel:'file-excel',operacion:'clipboard-list',planta:'industry',reportes:'chart-simple',consulta:'magnifying-glass'}[key] || 'shield-halved'; }
    async function api(path, opts={}) {
      const sep = path.includes('?') ? '&' : '?';
      const res = await fetch(path + sep + 'token=' + encodeURIComponent(token), opts);
      const data = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data.detail || 'Sesión inválida.');
      return data;
    }
    async function load(){
      if(!token){ location.href='/gas-lp/asistente'; return; }
      try{
        const data = await api('/api/internal-auth/gas-lp/summary');
        const a = data.assistant || {};
        nameBadge.textContent = a.display_name || 'Asistente';
        roleBadge.textContent = (a.role || '').replaceAll('_',' ');
        kpis.innerHTML = [
          ['Sesión', data.session?.hours + ' h', 'expira automáticamente'],
          ['Empresa', a.perfil_id || '—', 'perfil asignado'],
          ['Módulos', (data.modules||[]).length, 'según rol'],
          ['Seguridad', 'Aislado', 'tenant + perfil + rol']
        ].map(x=>`<div class="card kpi"><div class="label">${x[0]}</div><div class="value">${x[1]}</div><div class="muted">${x[2]}</div></div>`).join('');
        modules.innerHTML = (data.modules||[]).map(m=>`<div class="module"><i class="fa-solid fa-${iconFor(m.key)}"></i><div><b>${m.title}</b><span class="muted">${m.desc}</span></div></div>`).join('');
        notices.innerHTML = (data.notices||[]).map(n=>`<div class="module"><i class="fa-solid fa-circle-info"></i><div class="muted">${n}</div></div>`).join('');
      }catch(e){
        localStorage.removeItem('ge_gaslp_internal_token');
        location.href='/gas-lp/asistente';
      }
    }
    async function logout(){
      await fetch('/api/internal-auth/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})}).catch(()=>{});
      localStorage.removeItem('ge_gaslp_internal_token');
      location.href='/choice';
    }
    load();
  </script>
</body>
</html>
